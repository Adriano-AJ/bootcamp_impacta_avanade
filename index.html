<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <form id="form-imc" class="form-card">
            <h2>Calculadora de IMC</h2>
            
            <div class="input-group">
                <label for="peso">Peso (kg)</label>
                <input type="number" id="peso" placeholder="Ex: 75.5" step="0.1" required>
            </div>

            <div class="input-group">
                <label for="altura">Altura (m)</label>
                <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01" required>
            </div>

            <button type="submit" id="btn">Calcular IMC</button>

            <div id="resultado" class="hidden">
                <p>Seu IMC é: <span id="valor-imc">0</span></p>
                <p id="classificacao"></p>
            </div>
        </form>
    </div>

</body>
</html>
